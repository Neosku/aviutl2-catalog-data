name: Publish catalog

on:
  workflow_dispatch:
  pull_request:
    branches:
      - catalog-source
    paths:
      - "packages/**"
      - "catalog-popularity.json"
      - "catalog-schema/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/publish-catalog.yml"
  push:
    branches:
      - catalog-source
    paths:
      - "packages/**"
      - "catalog-popularity.json"
      - "catalog-schema/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/publish-catalog.yml"

permissions:
  contents: read

concurrency:
  group: publish-catalog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/catalog-source'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catalog source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm fmt:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Validate catalog source
        run: pnpm source:validate

      - name: Restore previous manifest timestamps
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if git fetch --no-tags origin catalog-distribution:refs/remotes/origin/catalog-distribution; then
            mkdir -p publish-preview
            git show origin/catalog-distribution:manifest.json > publish-preview/manifest.json
          fi

      - name: Build distribution and package list
        run: pnpm build

      - name: Validate distribution
        run: pnpm build:validate

      - name: Upload distribution
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: catalog-distribution
          path: publish-preview/
          if-no-files-found: error

  publish:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/catalog-source'
    needs: validate-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout catalog source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download distribution
        uses: actions/download-artifact@v8
        with:
          name: catalog-distribution
          path: publish-preview

      - name: Publish distribution branch
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          publish_worktree=".tmp/catalog-distribution-publish"

          if git fetch --no-tags origin catalog-distribution:refs/remotes/origin/catalog-distribution; then
            git worktree add --detach "$publish_worktree" origin/catalog-distribution
          else
            git worktree add --detach "$publish_worktree"
            git -C "$publish_worktree" switch --orphan catalog-distribution
          fi

          rsync -a --delete --exclude='.git' publish-preview/ "$publish_worktree"/
          git -C "$publish_worktree" add --all

          if git -C "$publish_worktree" diff --cached --quiet; then
            echo "Distribution is already up to date."
            exit 0
          fi

          git -C "$publish_worktree" config user.name "github-actions[bot]"
          git -C "$publish_worktree" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_worktree" commit -m "Publish catalog from ${SOURCE_SHA}"
          git -C "$publish_worktree" push origin HEAD:catalog-distribution
