name: AviUtl2 Catalog Data Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "index.json"
      - "tools/validate-index.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/validation.yml"
      - "image/**"
      - "md/**"
  push:
    branches:
      - main
    paths:
      - "index.json"
      - "tools/validate-index.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/validation.yml"
      - "image/**"
      - "md/**"

jobs:
  validate-catalog-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type and field validation
        run: pnpm run validate:index
